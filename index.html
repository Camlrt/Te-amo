<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Para ti ❤️</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
    color: white;
}

/* CENTRAR */
.contenido {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

/* TEXTO */
h1 {
    font-size: 80px;
    margin: 20px;
    animation: latidoTexto 1s infinite;
}

/* CORAZÓN */
.corazon {
    width: 180px;
    height: 180px;
    background: red;
    position: relative;
    transform: rotate(-45deg);
    animation: latido 1s infinite;
    margin: 30px;
}

.corazon::before,
.corazon::after {
    content: "";
    width: 180px;
    height: 180px;
    background: red;
    border-radius: 50%;
    position: absolute;
}

.corazon::before {
    top: -90px;
    left: 0;
}

.corazon::after {
    left: 90px;
    top: 0;
}

/* ANIMACIONES */
@keyframes latido {
    0% { transform: scale(1) rotate(-45deg); }
    50% { transform: scale(1.2) rotate(-45deg); }
    100% { transform: scale(1) rotate(-45deg); }
}

@keyframes latidoTexto {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* CONFETI */
.confeti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: pink;
    top: -10px;
    animation: caer linear infinite;
}

@keyframes caer {
    to {
        transform: translateY(100vh);
    }
}

/* IMAGEN */
img {
    width: 180px;
    border-radius: 20px;
    margin-top: 20px;
}
</style>
</head>

<body>

<script>
// 🔐 CONTRASEÑA
let clave = prompt("💖 Ingresa la contraseña:");

if (clave !== "280223") {
    document.body.innerHTML = "<h2 style='color:white; text-align:center; margin-top:40vh;'>Acceso denegado 😢</h2>";
} else {

    document.body.innerHTML = `
    <div class="contenido">
        <h1>TE AMO MI AMOR❤️</h1>
        <div class="corazon"></div>
        <img src="foto.jpg">
    </div>
    `;

    // 🎉 CONFETI
    for (let i = 0; i < 30; i++) {
        let c = document.createElement("div");
        c.className = "confeti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.animationDuration = (3 + Math.random() * 3) + "s";
        document.body.appendChild(c);
    }
}
</script>

</body>
</html>
